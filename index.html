<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes Anónimos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ff3c6f, #ff7a00);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: white;
}

/* CARD */
.card {
    width: 350px;
    border-radius: 20px;
    overflow: hidden;
    background: white;
    color: #333;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card-header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #f5f5f5;
    font-size: 14px;
}

/* AVATAR REAL */
.avatar {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 10px;
    border: 2px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.card-body {
    background: #f28b8b;
    padding: 20px;
    font-size: 16px;
    color: rgba(0,0,0,0.4);
}

/* TEXTOS */
.lock-text {
    margin-top: 15px;
    font-size: 14px;
}

.counter {
    margin: 20px 0;
    font-size: 16px;
    font-weight: bold;
}

/* BOTÓN ANIMADO */
.btn {
    background: black;
    color: white;
    border: none;
    border-radius: 40px;
    padding: 18px 60px;
    font-size: 18px;
    cursor: pointer;
    animation: pulse 1.8s infinite ease-in-out;
}

/* ANIMACIÓN */
@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,0,0,0.4);
    }
    50% {
        transform: scale(1.07);
        box-shadow: 0 0 20px 5px rgba(0,0,0,0.2);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0,0,0,0.4);
    }
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
}

.footer a {
    color: white;
    text-decoration: none;
    margin: 0 5px;
}
</style>
</head>

<body>

<div class="card">
    <div class="card-header">
        <img class="avatar" src="https://raw.githubusercontent.com/karinavanessadevia-spec/sex_symbol/main/IMG_8957.jpg">
        <div>
            <strong>@_sex_symbol</strong><br>
            envíame mensajes anónimos
        </div>
    </div>
    <div class="card-body">
        ¿te gusta alguien en este momento?
    </div>
</div>

<div class="lock-text">🔒 preguntas y respuestas anónimas</div>

<div class="counter">
    👇 <span id="count">428</span> amigos acaban de tocar el botón 👇
</div>

<button class="btn">¡Obtén tus propios mensajes!</button>

<div class="footer">
    <a href="#">Terms</a> · <a href="#">Privacy</a>
</div>

<script>
// CONTADOR DINÁMICO
let count = 428;

function updateCounter() {
    let change = Math.floor(Math.random() * 6) - 1; // sube o baja
    count += change;

    if (count < 200) count = 200;

    document.getElementById("count").textContent = count;
}

// actualización cada 1.5s
setInterval(updateCounter, 1500);
</script>

</body>
</html>
